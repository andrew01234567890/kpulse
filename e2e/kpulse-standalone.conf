### kpulse Kafka protocol handler — appended to conf/standalone.conf at container start ###
messagingProtocols=kafka
protocolHandlerDirectory=/pulsar/protocols
brokerEntryMetadataInterceptors=org.apache.pulsar.common.intercept.AppendIndexMetadataInterceptor
kafkaListeners=PLAINTEXT://0.0.0.0:9092
kafkaAdvertisedListeners=PLAINTEXT://127.0.0.1:9092
kafkaAllowInsecureRemote=true

# kpulse's KafkaTopicManager calls BrokerService#getTopic directly, bypassing the Pulsar
# lookup path that normally acquires namespace-bundle ownership on demand. With the standalone
# default of 4 bundles, any topic hashing into a bundle this broker hasn't already served hangs
# forever ("please redo the lookup"). One bundle means this single broker owns the whole key range
# up front. Mirrors kpulse-tests/EmbeddedPulsarKafka's config.setDefaultNumberOfNamespaceBundles(1).
defaultNumberOfNamespaceBundles=1
