version: 2
updates:
  # Actions referenced directly in .github/workflows/*
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "[patch]"
    groups:
      github-actions:
        patterns: ["*"]

  # Actions referenced inside the composite action (not scanned by directory "/").
  - package-ecosystem: github-actions
    directory: "/.github/actions/setup-java-gradle"
    schedule:
      interval: weekly
    commit-message:
      prefix: "[patch]"
    groups:
      composite-actions:
        patterns: ["*"]

  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "[patch]"
    groups:
      gradle:
        patterns: ["*"]
