name: dependabot-auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        # Turn on auto-merge for every Dependabot PR (including grouped and major-version bumps).
        # The branch ruleset's required checks (build-unit, kind-e2e, pr-title-check) are the only
        # gate: the PR merges once they pass.
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
