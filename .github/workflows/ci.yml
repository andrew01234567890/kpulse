name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  # PRs: group by ref so a new push cancels superseded runs. Main: group by SHA so each
  # commit's run is independent and can never be cancelled by a later push (which would
  # otherwise silently drop that commit's release).
  group: ci-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Semver: release (main) builds only; runs first and feeds the release job.
  version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      next: ${{ steps.compute.outputs.next }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - id: compute
        env:
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Idempotency: never re-release a commit that already carries a version tag
          # (e.g. someone hits "Re-run all jobs" on an already-released run).
          existing=$(git tag --points-at "${SHA}" | grep '^v' | head -1 || true)
          if [ -n "${existing}" ]; then
            echo "Commit ${SHA} is already released as ${existing} — skipping."
            echo "next=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # The repo is squash-only with PR-title-as-commit-subject, so the merged PR's [bump]
          # prefix is read straight from the commit subject. (The commits/{sha}/pulls API is
          # eventually consistent and returned empty right after a merge, silently skipping
          # releases.) Direct commits carry no prefix and never release.
          subject=$(git log -1 --format=%s "${SHA}")
          bump=$(printf '%s' "${subject}" | sed -nE 's/^\[(major|minor|patch)\].*/\1/p')
          if [ -z "${bump}" ]; then
            echo "No [major|minor|patch] bump in \"${subject}\" — no release."
            echo "next=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          latest=$(git tag -l 'v*' --sort=-v:refname | head -1)
          latest="${latest:-v0.0.0}"
          ver="${latest#v}"
          major="${ver%%.*}"; rest="${ver#*.}"; minor="${rest%%.*}"; patch="${rest##*.}"
          case "${bump}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          echo "next=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"
          echo "Next version: v${major}.${minor}.${patch} (bump=${bump}, previous=${latest})"

  build-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-java-gradle
      - name: Build, unit + integration tests
        run: ./gradlew build --console=plain --stacktrace
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports
          path: '**/build/reports/tests/**'
          if-no-files-found: ignore
          retention-days: 7

  kind-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      OXIA_IMAGE_SOURCE: oxia/oxia@sha256:ae01c97d1e3e686e66656ad4ef71cf9ec2cb834eec250e5598eb729bc30e43fc # v0.16.7 linux/amd64
      OXIA_IMAGE: oxia/oxia:0.16.7-kpulse
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-java-gradle
      - name: Build the kpulse NAR and e2e Kafka client
        run: ./gradlew :kpulse-protocol-handler:nar :e2e-client:installDist --console=plain
      - name: Stage NAR and e2e client for the broker image build
        run: |
          cp kpulse-protocol-handler/build/libs/kpulse-protocol-handler-*.nar e2e/kpulse.nar
          cp -r e2e-client/build/install/e2e-client e2e/e2e-client
      - name: Build the broker image with kpulse
        run: docker build --provenance=false -t kpulse-broker:e2e e2e
      - name: Create KIND cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: kpulse-e2e
      - name: Load the broker and Oxia images into KIND
        run: |
          docker pull "${OXIA_IMAGE_SOURCE}"
          docker tag "${OXIA_IMAGE_SOURCE}" "${OXIA_IMAGE}"
          kind load docker-image kpulse-broker:e2e --name kpulse-e2e
          kind load docker-image "${OXIA_IMAGE}" --name kpulse-e2e
      - name: Deploy Oxia and Pulsar standalone with kpulse
        run: kubectl apply -f e2e/pulsar-standalone.yaml
      - name: Wait for Oxia and broker readiness
        run: |
          kubectl rollout status deployment/oxia --timeout=120s
          kubectl rollout status deployment/pulsar-kpulse --timeout=300s
      - name: Assert real Kafka produce/consume round-trip, cross-checked via pulsar-admin
        run: bash e2e/assert.sh
      - name: Collect broker diagnostics on failure
        if: failure()
        run: |
          kubectl describe deployment/pulsar-kpulse || true
          kubectl logs deployment/pulsar-kpulse --tail=400 || true
          kubectl describe deployment/oxia || true
          kubectl logs deployment/oxia --tail=400 || true

  # Release: main only, after all tests pass, one release at a time.
  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.version.outputs.next != ''
    needs: [version, build-unit, kind-e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: kpulse-release
      cancel-in-progress: false
    steps:
      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          NEXT: ${{ needs.version.outputs.next }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "Releasing ${NEXT}"
          gh release create "${NEXT}" --target "${SHA}" --title "${NEXT}" --generate-notes
